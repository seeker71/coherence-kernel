<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The penumbra teaching, kinetic</title>
  <desc>A light labeled the four-way proof shines on a body. Behind the body lies the umbra, where nothing hides, and the penumbra, lit enough to run but dark enough to miss. A bug pulses in the penumbra. Every twelve seconds a second lamp, the wire-bool witness band, swings on and lights the penumbra; the bug turns green, caught. The scene loops.</desc>
  <defs>
    <radialGradient id="sunG" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="60%" stop-color="#f5c542"/>
      <stop offset="100%" stop-color="#c98500"/>
    </radialGradient>
    <radialGradient id="bodyG" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#8ba3c7"/>
      <stop offset="65%" stop-color="#48597a"/>
      <stop offset="100%" stop-color="#2b3752"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="680" height="400" rx="12" fill="#0d1322"/>

  <polygon points="102,168 300,154 300,226 102,212" fill="#f5e9c8" opacity="0.10"/>
  <polygon points="102,212 300,154 680,54 680,130 300,154" fill="#f5e9c8" opacity="0.05"/>

  <polygon points="300,154 680,54 680,130 300,154" fill="#3a4a6b" opacity="0.45"/>
  <polygon points="300,226 680,250 680,326 300,226" fill="#3a4a6b" opacity="0.45"/>
  <polygon points="300,154 680,130 680,250 300,226" fill="#05080f" opacity="0.92"/>

  <polygon points="300,154 680,54 680,130 300,154" fill="#f5e9c8" opacity="0">
    <animate attributeName="opacity" values="0;0;0.30;0.30;0" keyTimes="0;0.36;0.44;0.90;1" dur="12s" repeatCount="indefinite"/>
  </polygon>

  <circle cx="80" cy="190" r="22" fill="url(#sunG)"/>
  <text x="80" y="236" font-size="12" fill="#e8dfc8" text-anchor="middle" font-family="sans-serif">the four-way proof</text>
  <text x="80" y="251" font-size="11" fill="#8b93a5" text-anchor="middle" font-family="sans-serif">Go = Rust = TS = fkwu</text>

  <ellipse cx="300" cy="238" rx="34" ry="7" fill="#000000" opacity="0.5"/>
  <circle cx="300" cy="190" r="36" fill="url(#bodyG)"/>
  <text x="300" y="270" font-size="12" fill="#e8dfc8" text-anchor="middle" font-family="sans-serif">the body — the wire lane</text>

  <text x="500" y="196" font-size="13" fill="#5a6478" text-anchor="middle" font-family="sans-serif">umbra — nothing hides</text>

  <text x="470" y="42" font-size="13" fill="#b9c2d4" text-anchor="middle" font-family="sans-serif">penumbra — lit enough to run, dark enough to miss</text>

  <line x1="520" y1="112" x2="560" y2="76" stroke="#8b93a5" stroke-width="0.6" stroke-dasharray="3 3"/>
  <text x="564" y="72" font-size="11" fill="#b9c2d4" font-family="sans-serif">the bool bug lived here</text>

  <circle cx="520" cy="118" r="6" fill="#F0997B">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#F0997B;#F0997B;#5DCAA5;#5DCAA5;#F0997B" keyTimes="0;0.46;0.5;0.92;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="118" r="6" fill="none" stroke="#5DCAA5" stroke-width="2" opacity="0">
    <animate attributeName="r" values="6;6;30;30" keyTimes="0;0.5;0.6;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.5;0.52;0.64;1" dur="12s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.33;0.40;0.90;1" dur="12s" repeatCount="indefinite"/>
    <polygon points="596,44 606,58 420,140 380,110" fill="#9fe1cb" opacity="0.14"/>
    <circle cx="601" cy="50" r="10" fill="#5DCAA5"/>
    <line x1="601" y1="34" x2="601" y2="24" stroke="#5DCAA5" stroke-width="2"/>
    <line x1="614" y1="41" x2="622" y2="34" stroke="#5DCAA5" stroke-width="2"/>
    <line x1="588" y1="41" x2="580" y2="34" stroke="#5DCAA5" stroke-width="2"/>
    <text x="601" y="18" font-size="11" fill="#9fe1cb" text-anchor="middle" font-family="sans-serif">wire-bool-band</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.56;0.90;1" dur="12s" repeatCount="indefinite"/>
    <text x="500" y="368" font-size="13" fill="#5DCAA5" text-anchor="middle" font-family="sans-serif">a witness band lights the penumbra — caught, fixed, 255</text>
  </g>

  <text x="20" y="424" font-size="13" fill="#52514e" font-family="sans-serif" class="teach-cap">A green four-way is a clean bill for the umbra, not the penumbra.</text>
  <text x="20" y="444" font-size="12" fill="#898781" font-family="sans-serif">The bool bug sat in partial light for the life of the wire lane — until the lane grew its own second lamp. Loops every 12s.</text>
  <text x="660" y="444" font-size="10" fill="#898781" text-anchor="end" font-family="sans-serif">teachings/penumbra-teaching.svg · 2026-07-02 · receipts/2026-07-02-bool-node-value-round-trip.md</text>
</svg>
