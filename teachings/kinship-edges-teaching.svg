<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The kinship edges teaching, kinetic</title>
  <desc>Four meaning nodes of the locale baseline. The walker's light sweeps the graph and finds four internal bridges, all between the two wellbeing wishes 301 and 304 — Sanskrit bhavantu, Chinese wish-particle, and the form layer's own wish and wellbeing — kinship, not accident. Then a paraphrase comet arrives from outside the graph and strikes 304 through the word for: the one true spurious edge lives at query time, outside any table. Loops every fourteen seconds.</desc>
  <defs>
    <radialGradient id="nodeG" cx="35%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#7a8db0"/>
      <stop offset="70%" stop-color="#3d4d70"/>
      <stop offset="100%" stop-color="#273450"/>
    </radialGradient>
    <radialGradient id="kinNodeG" cx="35%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#9fe1cb"/>
      <stop offset="70%" stop-color="#1D9E75"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="680" height="400" rx="12" fill="#0d1322"/>

  <text x="340" y="30" font-size="13" fill="#b9c2d4" text-anchor="middle" font-family="sans-serif">the meaning graph, walked at rest — every internal bridge is kinship</text>

  <g>
    <path d="M 180 140 C 260 90 420 90 500 140" fill="none" stroke="#5DCAA5" stroke-width="2" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.9;0.9;0.15;0.15" keyTimes="0;0.14;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>
    </path>
    <path d="M 180 150 C 265 115 415 115 500 150" fill="none" stroke="#5DCAA5" stroke-width="2" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.15;0.9;0.9;0.15;0.15" keyTimes="0;0.1;0.2;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>
    </path>
    <path d="M 180 160 C 270 140 410 140 500 160" fill="none" stroke="#9fe1cb" stroke-width="2" opacity="0.15" stroke-dasharray="5 4">
      <animate attributeName="opacity" values="0.15;0.15;0.9;0.9;0.15;0.15" keyTimes="0;0.16;0.26;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>
    </path>
    <text x="340" y="88" font-size="12" fill="#5DCAA5" text-anchor="middle" font-family="sans-serif" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0.9;0;0" keyTimes="0;0.14;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>sa: bhavantu — the shared verb "may it be"</text>
    <text x="340" y="112" font-size="12" fill="#5DCAA5" text-anchor="middle" font-family="sans-serif" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.1;0.2;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>zh: 愿 — both open with the wishing particle</text>
    <text x="340" y="152" font-size="12" fill="#9fe1cb" text-anchor="middle" font-family="sans-serif" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.16;0.26;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>form: wish · wellbeing — the neutral layer itself declares them kin</text>
  </g>

  <g>
    <circle cx="180" cy="180" r="34" fill="url(#nodeG)">
      <animate attributeName="fill" values="url(#nodeG);url(#kinNodeG);url(#kinNodeG);url(#nodeG);url(#nodeG)" keyTimes="0;0.14;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>
    </circle>
    <text x="180" y="176" font-size="13" fill="#e8dfc8" text-anchor="middle" font-family="sans-serif">301</text>
    <text x="180" y="192" font-size="10" fill="#b9c2d4" text-anchor="middle" font-family="sans-serif">may all be happy</text>
  </g>
  <g>
    <circle cx="500" cy="180" r="34" fill="url(#nodeG)">
      <animate attributeName="fill" values="url(#nodeG);url(#kinNodeG);url(#kinNodeG);url(#nodeG);url(#nodeG)" keyTimes="0;0.14;0.5;0.6;1" dur="14s" repeatCount="indefinite"/>
    </circle>
    <text x="500" y="176" font-size="13" fill="#e8dfc8" text-anchor="middle" font-family="sans-serif">304</text>
    <text x="500" y="192" font-size="10" fill="#b9c2d4" text-anchor="middle" font-family="sans-serif">peace for every world</text>
  </g>
  <g>
    <circle cx="180" cy="310" r="30" fill="url(#nodeG)"/>
    <text x="180" y="306" font-size="13" fill="#e8dfc8" text-anchor="middle" font-family="sans-serif">302</text>
    <text x="180" y="322" font-size="10" fill="#b9c2d4" text-anchor="middle" font-family="sans-serif">truth alone triumphs</text>
  </g>
  <g>
    <circle cx="500" cy="310" r="30" fill="url(#nodeG)"/>
    <text x="500" y="306" font-size="13" fill="#e8dfc8" text-anchor="middle" font-family="sans-serif">303</text>
    <text x="500" y="322" font-size="10" fill="#b9c2d4" text-anchor="middle" font-family="sans-serif">i am</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.68;0.93;1" dur="14s" repeatCount="indefinite"/>
    <text x="648" y="238" font-size="11" fill="#F0997B" text-anchor="end" font-family="sans-serif">"happiness for everyone"</text>
    <text x="648" y="253" font-size="10" fill="#8b93a5" text-anchor="end" font-family="sans-serif">a paraphrase, outside the graph</text>
  </g>
  <g>
    <circle r="7" fill="#F0997B" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.64;0.66;0.8;0.84;1" dur="14s" repeatCount="indefinite"/>
      <animateMotion path="M 660 260 C 620 250 560 230 519 199" dur="14s" keyPoints="0;0;1;1" keyTimes="0;0.64;0.8;1" repeatCount="indefinite"/>
    </circle>
    <text x="565" y="222" font-size="12" fill="#F0997B" font-family="sans-serif" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.8;0.83;0.93;1" dur="14s" repeatCount="indefinite"/>"for" — spurious, query-time</text>
    <circle cx="519" cy="199" r="8" fill="none" stroke="#F0997B" stroke-width="2" opacity="0">
      <animate attributeName="r" values="8;8;30;30" keyTimes="0;0.8;0.9;1" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.8;0.82;0.92;1" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.82;0.86;0.93;1" dur="14s" repeatCount="indefinite"/>
    <text x="340" y="368" font-size="13" fill="#F0997B" text-anchor="middle" font-family="sans-serif">the one true spurious edge arrives from OUTSIDE the table — no walk at rest can see it coming</text>
  </g>

  <text x="20" y="424" font-size="13" fill="#52514e" font-family="sans-serif">A detector built for pathology, run on a healthy body, becomes an anatomy.</text>
  <text x="20" y="444" font-size="12" fill="#898781" font-family="sans-serif">All 4 internal bridges are kinship (301↔304); zero spurious. The "for" edge is query-time. Loops every 14s.</text>
  <text x="660" y="444" font-size="10" fill="#898781" text-anchor="end" font-family="sans-serif">teachings/kinship-edges-teaching.svg · learn/spurious-edge-walker.fk (band 255) · 2026-07-02</text>
</svg>
